name: PO Task
description: Implementation, research, or infra task for Product Owner track
title: "[Task] "
labels: ["task", "type:task", "track:po"]
body:
  - type: markdown
    attributes:
      value: |
        **PO task** — concrete dev/research/infra work. Link **Story**, **Backlog ID**, and **Epic**.
  - type: input
    id: task_id
    attributes:
      label: Task ID
      placeholder: JH-T-B06-01
    validations:
      required: true
  - type: input
    id: backlog_id
    attributes:
      label: Backlog ID
      placeholder: B-06
    validations:
      required: true
  - type: input
    id: parent_story
    attributes:
      label: Parent User Story
      placeholder: US-JH-B06 or issue #42
    validations:
      required: true
  - type: dropdown
    id: task_type
    attributes:
      label: Task type
      options:
        - implementation
        - research
        - infrastructure
        - documentation
        - ui-ux
        - integration
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps / scope
      description: What to build or investigate
    validations:
      required: true
  - type: checkboxes
    id: definition_of_done
    attributes:
      label: Definition of Done
      options:
        - label: Code merged or doc published
        - label: Acceptance criteria of parent story met
        - label: README or docs updated
