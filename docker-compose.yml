services:
  node-api:
    build:
      context: .
      dockerfile: sut/node-api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      OPENAPI_PATH: /openapi/abm-crud.yaml

  spring-api:
    build:
      context: .
      dockerfile: sut/spring-api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080

  dotnet-api:
    build:
      context: .
      dockerfile: sut/dotnet-api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
